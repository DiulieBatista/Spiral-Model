<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiral Model — Metodologia de Desenvolvimento</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0f13;
      --surface: #16181f;
      --border:  rgba(255,255,255,0.08);
      --text:    #e8e6df;
      --muted:   #7a7870;
      --blue:    #378ADD;
      --teal:    #1D9E75;
      --amber:   #BA7517;
      --purple:  #7F77DD;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 400;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 6px;
      color: var(--text);
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 40px;
      max-width: 520px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      max-width: 700px;
      width: 100%;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* SVG text classes */
    .th { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #e8e6df; }
    .ts { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; fill: #9a9890; }

    /* Color node classes */
    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #0c1e35; stroke: #378ADD; }
    .c-blue   .th { fill: #85B7EB; } .c-blue   .ts { fill: #378ADD; }
    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #041a11; stroke: #1D9E75; }
    .c-teal   .th { fill: #5DCAA5; } .c-teal   .ts { fill: #1D9E75; }
    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #1a0e00; stroke: #BA7517; }
    .c-amber  .th { fill: #EF9F27; } .c-amber  .ts { fill: #BA7517; }
    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #120f2e; stroke: #7F77DD; }
    .c-purple .th { fill: #AFA9EC; } .c-purple .ts { fill: #7F77DD; }

    .node { cursor: pointer; }
    .node:hover rect, .node:hover circle { opacity: 0.85; }

    @keyframes spin-dash { to { stroke-dashoffset: -60; } }
    @keyframes pulse-dot { 0%,100%{r:5} 50%{r:7} }

    .ring1 { animation: spin-dash 6s linear infinite; }
    .ring2 { animation: spin-dash 9s linear infinite; }
    .ring3 { animation: spin-dash 13s linear infinite; }
    .ring4 { animation: spin-dash 18s linear infinite; }
    .pdot  { animation: pulse-dot 2s ease-in-out infinite; }

    footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    footer span { color: var(--text); }
  </style>
</head>
<body>

  <h1>Spiral Model</h1>
  <p class="subtitle">Metodologia de desenvolvimento baseada em ciclos iterativos que combinam planejamento, análise de riscos, desenvolvimento e avaliação contínua.</p>

  <div class="card">
    <svg viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Animated background rings -->
      <circle class="ring1" cx="340" cy="340" r="62"  fill="none" stroke="#378ADD" stroke-width="28" stroke-opacity="0.13" stroke-dasharray="30 68"/>
      <circle class="ring2" cx="340" cy="340" r="124" fill="none" stroke="#1D9E75" stroke-width="32" stroke-opacity="0.11" stroke-dasharray="40 156"/>
      <circle class="ring3" cx="340" cy="340" r="192" fill="none" stroke="#BA7517" stroke-width="36" stroke-opacity="0.10" stroke-dasharray="55 249"/>
      <circle class="ring4" cx="340" cy="340" r="262" fill="none" stroke="#7F77DD" stroke-width="40" stroke-opacity="0.09" stroke-dasharray="75 349"/>

      <!-- Guide rings -->
      <circle cx="340" cy="340" r="62"  fill="none" stroke="#378ADD" stroke-width="1" stroke-opacity="0.35"/>
      <circle cx="340" cy="340" r="124" fill="none" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.30"/>
      <circle cx="340" cy="340" r="192" fill="none" stroke="#BA7517" stroke-width="1" stroke-opacity="0.25"/>
      <circle cx="340" cy="340" r="262" fill="none" stroke="#7F77DD" stroke-width="1" stroke-opacity="0.22"/>

      <!-- Quadrant dividers -->
      <line x1="340" y1="65"  x2="340" y2="615" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
      <line x1="65"  y1="340" x2="615" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>

      <!-- Quadrant labels -->
      <text class="th" x="495" y="115" text-anchor="middle" fill="#185FA5" font-size="13" opacity="0.6">Planejamento</text>
      <text class="th" x="185" y="115" text-anchor="middle" fill="#0F6E56" font-size="13" opacity="0.6">Análise de riscos</text>
      <text class="th" x="185" y="590" text-anchor="middle" fill="#854F0B" font-size="13" opacity="0.6">Engenharia</text>
      <text class="th" x="495" y="590" text-anchor="middle" fill="#534AB7" font-size="13" opacity="0.6">Avaliação</text>

      <!-- Spiral paths — Volta 1 -->
      <path d="M340,278 A62,62 0 0,1 402,340" fill="none" stroke="#378ADD" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M402,340 A62,62 0 0,1 340,402" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M340,402 A62,62 0 0,1 278,340" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M278,340 A68,68 0 0,1 340,272"  fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

      <!-- Volta 2 -->
      <path d="M340,216 A124,124 0 0,1 464,340" fill="none" stroke="#378ADD" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
      <path d="M464,340 A124,124 0 0,1 340,464" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
      <path d="M340,464 A124,124 0 0,1 216,340" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
      <path d="M216,340 A134,134 0 0,1 340,206" fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

      <!-- Volta 3 -->
      <path d="M340,148 A192,192 0 0,1 532,340" fill="none" stroke="#378ADD" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M532,340 A192,192 0 0,1 340,532" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M340,532 A192,192 0 0,1 148,340" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M148,340 A206,206 0 0,1 340,134" fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

      <!-- Volta 4 -->
      <path d="M340,78  A262,262 0 0,1 602,340" fill="none" stroke="#378ADD" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <path d="M602,340 A262,262 0 0,1 340,602" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <path d="M340,602 A262,262 0 0,1 78,340"  fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <path d="M78,340  A278,278 0 0,1 340,62"  fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round" opacity="0.55" marker-end="url(#arrow)"/>

      <!-- Milestone dots — Volta 1 -->
      <circle class="pdot" cx="402" cy="340" r="5" fill="#1D9E75"/>
      <circle class="pdot" cx="340" cy="402" r="5" fill="#BA7517"/>
      <circle class="pdot" cx="278" cy="340" r="5" fill="#7F77DD"/>
      <circle class="pdot" cx="340" cy="272" r="5" fill="#378ADD"/>

      <!-- Milestone dots — Volta 2 -->
      <circle cx="464" cy="340" r="5" fill="#1D9E75" opacity="0.8"/>
      <circle cx="340" cy="464" r="5" fill="#BA7517" opacity="0.8"/>
      <circle cx="216" cy="340" r="5" fill="#7F77DD" opacity="0.8"/>
      <circle cx="340" cy="206" r="5" fill="#378ADD" opacity="0.8"/>

      <!-- Milestone dots — Volta 3 -->
      <circle cx="532" cy="340" r="5" fill="#1D9E75" opacity="0.7"/>
      <circle cx="340" cy="532" r="5" fill="#BA7517" opacity="0.7"/>
      <circle cx="148" cy="340" r="5" fill="#7F77DD" opacity="0.7"/>
      <circle cx="340" cy="134" r="5" fill="#378ADD" opacity="0.7"/>

      <!-- Milestone dots — Volta 4 -->
      <circle cx="602" cy="340" r="5" fill="#1D9E75" opacity="0.6"/>
      <circle cx="340" cy="602" r="5" fill="#BA7517" opacity="0.6"/>
      <circle cx="78"  cy="340" r="5" fill="#7F77DD" opacity="0.6"/>

      <!-- Center -->
      <circle cx="340" cy="340" r="28" fill="#16181f" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text class="ts" x="340" y="344" text-anchor="middle" dominant-baseline="central" font-size="11">início</text>

      <!-- Phase cards -->
      <!-- Planejamento -->
      <g class="node c-blue">
        <rect x="420" y="68" width="140" height="52" rx="10" stroke-width="0.8"/>
        <text class="th" x="490" y="88" text-anchor="middle" dominant-baseline="central">Planejamento</text>
        <text class="ts" x="490" y="106" text-anchor="middle" dominant-baseline="central">Objetivos e escopo</text>
      </g>
      <line x1="420" y1="94" x2="402" y2="116" stroke="#378ADD" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

      <!-- Análise de riscos -->
      <g class="node c-teal">
        <rect x="118" y="68" width="160" height="52" rx="10" stroke-width="0.8"/>
        <text class="th" x="198" y="88" text-anchor="middle" dominant-baseline="central">Análise de riscos</text>
        <text class="ts" x="198" y="106" text-anchor="middle" dominant-baseline="central">Identifica e mitiga falhas</text>
      </g>
      <line x1="278" y1="94" x2="278" y2="120" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

      <!-- Engenharia -->
      <g class="node c-amber">
        <rect x="100" y="562" width="140" height="52" rx="10" stroke-width="0.8"/>
        <text class="th" x="170" y="582" text-anchor="middle" dominant-baseline="central">Engenharia</text>
        <text class="ts" x="170" y="600" text-anchor="middle" dominant-baseline="central">Desenvolve e testa</text>
      </g>
      <line x1="170" y1="562" x2="170" y2="532" stroke="#BA7517" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

      <!-- Avaliação -->
      <g class="node c-purple">
        <rect x="430" y="562" width="148" height="52" rx="10" stroke-width="0.8"/>
        <text class="th" x="504" y="582" text-anchor="middle" dominant-baseline="central">Avaliação</text>
        <text class="ts" x="504" y="600" text-anchor="middle" dominant-baseline="central">Feedback do cliente</text>
      </g>
      <line x1="504" y1="562" x2="504" y2="532" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

      <!-- Legend -->
      <rect x="60" y="648" width="560" height="46" rx="10" fill="#1c1e26" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
      <circle cx="98"  cy="671" r="6" fill="#378ADD"/>
      <text class="ts" x="112" y="675" dominant-baseline="central">Planejamento</text>
      <circle cx="232" cy="671" r="6" fill="#1D9E75"/>
      <text class="ts" x="246" y="675" dominant-baseline="central">Análise de riscos</text>
      <circle cx="380" cy="671" r="6" fill="#BA7517"/>
      <text class="ts" x="394" y="675" dominant-baseline="central">Engenharia</text>
      <circle cx="492" cy="671" r="6" fill="#7F77DD"/>
      <text class="ts" x="506" y="675" dominant-baseline="central">Avaliação</text>
    </svg>
  </div>

  <footer>
    Spiral Model · Barry Boehm, 1986 · <span>Ciclos iterativos de desenvolvimento</span>
  </footer>

</body>
</html>
